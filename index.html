<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Dance Tracker 5000
    </title>

    <link rel="stylesheet" href="./styles.css">

</head>

<body>

    <div id="app">

        <header class="titlebar">

            <div>
                ⚡ DANCE TRACKER 5000
            </div>

            <div class="subtitle">
                REALTIME DEMO SCENE VIDEO SYNTHESIZER
            </div>

        </header>

        <nav class="main-menu">

            <button data-menu="project">
            PROJECT
        </button>

            <button data-menu="video">
            VIDEO
        </button>

            <button data-menu="body">
            BODY
        </button>

            <button data-menu="amiga">
            AMIGA
        </button>

            <button data-menu="fx">
            FX
        </button>

            <button data-menu="audio">
            AUDIO
        </button>

            <button data-menu="presets">
            PRESETS
        </button>

            <button data-menu="help">
            HELP
        </button>

        </nav>

        <nav id="sub-menu" class="sub-menu">

            <button>
            START CAMERA
        </button>

            <button>
            RECORD
        </button>

            <button>
            DOWNLOAD
        </button>

        </nav>

        <main class="workspace">

            <section class="panel camera-panel">

                <div class="panel-title">
                    CAMERA INPUT
                </div>

                <div class="screen">

                    <video id="camera" autoplay muted playsinline>
                </video>

                </div>

            </section>

            <section class="panel output-panel">

                <div class="panel-title">
                    LIVE OUTPUT
                </div>

                <div class="screen output-stack">

                    <canvas id="background-layer">
                </canvas>

                    <canvas id="effect-layer">
                </canvas>

                    <canvas id="body-layer">
                </canvas>

                    <canvas id="overlay-layer">
                </canvas>

                </div>

            </section>

        </main>

        <footer class="statusbar">

            <span>
            STATUS: READY
        </span>

            <span>
            FPS: --
        </span>

            <span>
            BODY: OFF
        </span>

            <span>
            FX: 0
        </span>

            <span>
            REC: OFF
        </span>
            <span>
            320x240
        </span>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
